server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # SPA: any path falls back to index.html (routing is query-param based, e.g. ?room=<id>).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
