server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # REST API → sync service (same Docker network as the web container).
  location /api/ {
    proxy_pass http://sync:1234/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # SPA: any path falls back to index.html (routing is query-param based, e.g. ?room=<id>).
  location / {
    add_header Content-Security-Policy "frame-ancestors *" always;
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
