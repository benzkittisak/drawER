# Keep-alive pool to the sync server so each /api/ request reuses a connection instead of paying a
# fresh TCP + HTTP handshake. `upstream` is an http-context directive — valid at the top of this
# file because conf.d/*.conf is included inside the http{} block.
upstream sync_upstream {
  server sync:1234;
  keepalive 16;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Compress text/code on the fly (~70-80% smaller JS/CSS/JSON over the wire). text/html is always
  # compressed by nginx; woff2 is already internally compressed so it is intentionally omitted.
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript text/javascript application/json
             image/svg+xml application/wasm application/manifest+json;
  # If the build emits precompressed .gz siblings, serve them directly (the gzip_static module ships
  # in the official nginx:alpine image). Harmless no-op when no .gz files exist — dynamic gzip covers it.
  gzip_static on;

  # REST API → sync service (same Docker network as the web container). The WebSocket (Yjs) connects
  # directly to ws://sync:1234, not through here, so this stays a plain keep-alive REST proxy.
  location /api/ {
    proxy_pass http://sync_upstream/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";          # required for upstream keep-alive
  }

  # index.html must NOT be cached, so a new deploy's freshly-hashed assets are picked up immediately
  # (the /assets/ files stay immutable below). The embed CSP is repeated here because a location with
  # its own add_header does not inherit add_header from the parent.
  location = /index.html {
    add_header Cache-Control "no-cache" always;
    add_header Content-Security-Policy "frame-ancestors *" always;
  }

  # SPA: any path falls back to index.html (routing is query-param based, e.g. ?room=<id>).
  location / {
    add_header Content-Security-Policy "frame-ancestors *" always;
    try_files $uri $uri/ /index.html;
  }

  # Long-cache hashed assets (filenames change on every build → safe to cache forever).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
