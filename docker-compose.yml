# drawDB Live — full stack.
#   db   : PostgreSQL 16 (persistent volume)
#   sync : Yjs websocket server + Postgres persistence on :1234
#   web  : the built SPA served by nginx on :9901
#
# Usage:   docker compose up --build      then open http://localhost:9901
# The browser reaches the sync server via the published host port ws://localhost:1234,
# which is what VITE_SYNC_URL is baked to below. To deploy elsewhere, rebuild web with
# --build-arg VITE_SYNC_URL=wss://your-host (and publish the sync server there).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drawer
      POSTGRES_PASSWORD: drawer
      POSTGRES_DB: drawer
    volumes:
      - drawer-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U drawer -d drawer']
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  sync:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: '1234'
      DATABASE_URL: postgres://drawer:drawer@db:5432/drawer
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - '1234:1234'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SYNC_URL: ws://localhost:1234
    ports:
      - '9901:80'
    depends_on:
      - sync
    restart: unless-stopped

volumes:
  drawer-pg:
