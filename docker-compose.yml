# drawDB Live — full stack (production).
#   db   : PostgreSQL 16 (persistent volume; NOT published to the host)
#   sync : Yjs websocket server + Postgres persistence + REST (/api/*) on :1234
#   web  : the built SPA served by nginx on :9901 (nginx proxies /api/ → sync)
#
# Usage:   docker compose up --build      then open http://localhost:9901
# The browser reaches the sync server via the published host port ws://localhost:1234,
# which is what VITE_SYNC_URL is baked to below. To deploy elsewhere, rebuild web with
# --build-arg VITE_SYNC_URL=wss://your-host (and publish the sync server there).
#
# Optional features are configured by env (a .env file beside this compose is auto-loaded).
# They default OFF/safe in production — see the sync service below. Parity note: this mirrors
# docker-compose.dev.yml, but dev defaults the DB-import flags ON to reach local databases,
# whereas prod keeps them OFF (the server opens outbound connections to user-supplied DBs).
services:
  db:
    image: postgres:16-alpine
    # Tuned for modest hardware (sized to fit the mem_limit below). shared_buffers ≈ 25% of the
    # limit; effective_cache_size is only a planner hint for OS cache, not an allocation.
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=64MB
    environment:
      POSTGRES_USER: drawer
      POSTGRES_PASSWORD: drawer
      POSTGRES_DB: drawer
    volumes:
      - drawer-pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U drawer -d drawer']
      interval: 5s
      timeout: 5s
      retries: 8
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

  sync:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: '1234'
      DATABASE_URL: postgres://drawer:drawer@db:5432/drawer
      # "Generate with AI" (POST /api/ai/generate-schema) — inert until a key is provided.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      # Remote DB import (Import → Database tab → POST /api/db/connect,/api/db/introspect).
      # OFF by default in prod: enabling lets the server open outbound connections to
      # user-supplied database URLs. Set ENABLE_REMOTE_DB_IMPORT=1 to turn it on.
      ENABLE_REMOTE_DB_IMPORT: ${ENABLE_REMOTE_DB_IMPORT:-0}
      # Keep 0 in prod — blocks connections to private/internal/loopback addresses (SSRF guard).
      # (docker-compose.dev.yml sets this to 1 so it can reach localhost / the db container.)
      DB_IMPORT_ALLOW_PRIVATE_NET: ${DB_IMPORT_ALLOW_PRIVATE_NET:-0}
      DB_IMPORT_MAX_TABLES: ${DB_IMPORT_MAX_TABLES:-500}
      DB_IMPORT_TIMEOUT_MS: ${DB_IMPORT_TIMEOUT_MS:-15000}
    ports:
      - '1234:1234'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (not localhost): busybox wget resolves localhost→::1 first and won't fall back to IPv4.
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:1234/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SYNC_URL: ws://localhost:1234
    ports:
      - '9901:80'
    depends_on:
      sync:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (not localhost): nginx listens on IPv4 only, but busybox wget resolves
      # localhost→::1 first and won't fall back — so the check would fail against a healthy server.
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

volumes:
  drawer-pg:
